<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    width: 230px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(15px);
    padding: 20px;
}

.main-content {
    margin-left: 250px;
    padding: 20px;
}

.section { margin-top: 25px; }

.form-grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
}

input {
    padding: 8px;
    border-radius: 8px;
}

.record-card {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
}

/* LIGHT MODE */
.light-mode {
    background: #f5f5f5;
    color: black;
}

.light-mode .sidebar {
    background: rgba(255,255,255,0.9);
}

.light-mode .record-card {
    background: rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🩺 HealthAI</h2>

    <button onclick="go('dashboard.html')" data-i18n="dashboard">Dashboard</button>
    <button onclick="go('predict.html')" data-i18n="predict">Prediction</button>
    <button onclick="go('appointment.html')" data-i18n="appointment">Appointment</button>

    <button onclick="toggleTheme()">🌙 Theme</button>

    <select onchange="changeLang(this.value)">
        <option value="en">EN</option>
        <option value="hi">HI</option>
    </select>

    <button onclick="logout()" data-i18n="logout">Logout</button>
</div>

<div class="main-content">

    <h1 data-i18n="dashboard">Patient Dashboard</h1>

    <div id="userData" class="glass-card"></div>

    <div class="section">
        <h2>📊 Activity</h2>
        <canvas id="historyChart"></canvas>
    </div>

    <div class="section">
        <div id="insights" class="glass-card"></div>
    </div>

    <div class="section glass-card">
        <h2 data-i18n="patientMgmt">📋 Patient Management</h2>

        <div class="form-grid">
            <input id="patientName" placeholder="Patient Name">
            <input id="patientAge" placeholder="Age">
        </div>

        <button onclick="createPatient()">Create Patient</button>

        <div class="form-grid">
            <input id="finding" placeholder="Finding">
            <input id="delivery" placeholder="Delivery">
            <input id="engagement" placeholder="Engagement">
            <input id="literacy" placeholder="Literacy">
            <input id="diseaseHistory" placeholder="Disease History">
        </div>

        <button onclick="addFinding()">Add Finding</button>
        <button onclick="addDelivery()">Add Delivery</button>
        <button onclick="addEngagement()">Add Engagement</button>
        <button onclick="addLiteracy()">Add Literacy</button>
        <button onclick="addDisease()">Add Disease</button>
    </div>

    <div class="section glass-card">
        <h2 data-i18n="records">📁 Records</h2>
        <div id="records"></div>
    </div>

</div>

<script src="js/i18n.js"></script>
<script src="js/dashboard.js"></script>

<script>
function go(p){ window.location.href = p }
function logout(){ localStorage.clear(); window.location = 'index.html' }
</script>

</body>
</html>
