<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="css/styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/i18n.js"></script>

<style>
/* Tabs */
.tabs {
    display: flex;
    gap: 10px;
    margin: 15px 0;
}

.tabs button {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid cyan;
    padding: 10px;
    border-radius: 10px;
}

.tabs button.active {
    background: linear-gradient(45deg, #00f2fe, #4facfe);
}

/* 🔥 FIX: Proper tab visibility */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* Center ONLY inside sections */
.center-block {
    display: flex;
    justify-content: center;
}

/* Medium width */
.box-width {
    width: 100%;
    max-width: 600px;
}

/* Section spacing */
.section {
    margin-top: 25px;
}
</style>
</head>

<body class="dashboard-page">

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h2>🩺 HealthAI</h2>

    <button onclick="go('dashboard.html')" data-i18n="dashboard">Dashboard</button>
    <button onclick="go('predict.html')" data-i18n="predict">Prediction</button>
    <button onclick="go('appointment.html')" data-i18n="appointment">Appointment</button>

    <button onclick="toggleTheme()">🌙 Theme</button>

    <select onchange="changeLang(this.value)">
        <option value="en">EN</option>
        <option value="hi">HI</option>
    </select>

    <button onclick="logout()" data-i18n="logout">Logout</button>
</div>

<!-- ================= MAIN ================= -->
<div class="main-content">

<h1 data-i18n="dashboard">Patient Dashboard</h1>

<div id="userData" class="glass-card"></div>

<!-- ================= TABS ================= -->
<div class="tabs">
    <button class="active" onclick="openTab('overview', this)">Overview</button>
    <button onclick="openTab('patient', this)">Patient</button>
    <button onclick="openTab('recordsTab', this)">Records</button>
</div>

<!-- ================= OVERVIEW ================= -->
<div id="overview" class="tab-content active">

    <div class="section">
        <div class="center-block">
            <div class="box-width">
                <h2>📊 Activity</h2>
                <canvas id="historyChart"></canvas>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="center-block">
            <div id="insights" class="glass-card box-width"></div>
        </div>
    </div>

</div>

<!-- ================= PATIENT ================= -->
<div id="patient" class="tab-content">

    <div class="section">
        <div class="center-block">
            <div class="glass-card box-width">

                <h2 data-i18n="patientMgmt">📋 Patient Management</h2>

                <div class="form-grid">
                    <input id="patientName" placeholder="Patient Name">
                    <input id="patientAge" placeholder="Age">
                </div>

                <button onclick="createPatient()">Create Patient</button>

                <div class="form-grid">
                    <input id="finding" placeholder="Finding">
                    <input id="delivery" placeholder="Delivery">
                    <input id="engagement" placeholder="Engagement">
                    <input id="literacy" placeholder="Literacy">
                    <input id="diseaseHistory" placeholder="Disease History">
                </div>

                <button onclick="addFinding()">Add Finding</button>
                <button onclick="addDelivery()">Add Delivery</button>
                <button onclick="addEngagement()">Add Engagement</button>
                <button onclick="addLiteracy()">Add Literacy</button>
                <button onclick="addDisease()">Add Disease</button>

            </div>
        </div>
    </div>

</div>

<!-- ================= RECORDS ================= -->
<div id="recordsTab" class="tab-content">

    <div class="section">
        <div class="center-block">
            <div class="glass-card box-width">

                <h2 data-i18n="records">📁 Records</h2>
                <div id="records"></div>

            </div>
        </div>
    </div>

</div>

</div>

<script src="js/dashboard.js"></script>

<script>
function go(p){ window.location.href = p }
function logout(){ localStorage.clear(); window.location = 'index.html' }

/* Tabs */
function openTab(id, btn){
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));

    document.getElementById(id).classList.add("active");
    btn.classList.add("active");
}
</script>

</body>
</html>
