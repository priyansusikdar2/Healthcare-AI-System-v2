<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disease Prediction</title>
<link rel="stylesheet" href="css/styles.css">

<style>
/* Extra UI for symptoms */
.symptom-container {
    max-height: 250px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 10px;
}

.glass {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    padding: 6px;
    border-radius: 8px;
    font-size: 12px;
}

.search-box {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
}

/* Loader */
#loading {
    display: none;
    margin-top: 10px;
}

.spinner {
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid cyan;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Confidence bar */
.bar-container {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin-top: 10px;
}

.bar {
    height: 8px;
    width: 0%;
    background: cyan;
    border-radius: 10px;
    transition: width 1s ease;
}

/* Severity colors */
.low { color: #00ffcc; }
.medium { color: orange; }
.high { color: red; }
</style>
</head>

<body>

<!-- NAV -->
<div class="glass-nav">
    <button onclick="go('dashboard.html')">Dashboard</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN CARD -->
<div class="glass-card">
    <h2>Disease Prediction</h2>

    <!-- SEARCH -->
    <input type="text" id="search" class="search-box" placeholder="Search symptoms...">

    <!-- SYMPTOMS -->
    <form id="predictionForm">
        <div id="symptomsContainer" class="symptom-container"></div>

        <button type="submit" data-i18n="predict">Predict</button>
    </form>

    <!-- LOADER -->
    <div id="loading" class="hidden">
        <div class="spinner"></div>
    </div>

    <!-- RESULT -->
    <div id="result"></div>
</div>

<script src="js/i18n.js"></script>
<script src="js/predict.js"></script>

<script>
// Navigation
function go(p){ window.location.href = p }
function logout(){ localStorage.clear(); window.location = 'index.html' }

// 🔍 SEARCH FILTER
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toLowerCase();
    const labels = document.querySelectorAll("#symptomsContainer label");

    labels.forEach(label => {
        const text = label.innerText.toLowerCase();
        label.style.display = text.includes(value) ? "flex" : "none";
    });
});
</script>

</body>
</html>
