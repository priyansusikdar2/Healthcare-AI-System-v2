<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment</title>
<link rel="stylesheet" href="css/styles.css">

<style>
.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: linear-gradient(45deg, cyan, blue);
    color: white;
}

.appointment-card {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.appointment-card button {
    background: red;
    padding: 5px 10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="glass-nav">
    <button onclick="go('dashboard.html')">Dashboard</button>
    <button onclick="logout()">Logout</button>

    <!-- LANGUAGE -->
    <select onchange="changeLang(this.value)">
        <option value="en">EN</option>
        <option value="hi">HI</option>
    </select>
</div>

<!-- MAIN -->
<div class="container">

    <!-- BOOK -->
    <div class="glass-card">
        <h2 data-i18n="appointment">Book Appointment</h2>

        <div class="form-group">
            <input id="name" placeholder="Patient Name">
            <input id="date" type="date">
        </div>

        <button onclick="book()">Book Now</button>
    </div>

    <!-- LIST -->
    <div class="glass-card">
        <h2>📅 Your Appointments</h2>
        <div id="appointmentsList"></div>
    </div>

</div>

<!-- SCRIPTS -->
<script src="js/i18n.js"></script>
<script src="js/appointment.js"></script>

<script>
function go(p){window.location.href=p}
function logout(){localStorage.clear();window.location='index.html'}
</script>

</body>
</html>
